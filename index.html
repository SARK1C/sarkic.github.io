<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARKIC | LINKS</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=VT323&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Draculitos';
            src: url('DraculitoS_.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #0a0a0a;
            --text-color: #f0f0f0;
            --card-bg: #1c1c1c;
            --card-hover: #2a2a2a;
            --border-color: #555555;
        }

        body {
            font-family: 'VT323', monospace;
            background: 
                linear-gradient(rgba(10, 10, 10, 0.88), rgba(10, 10, 10, 0.92)),
                url('logo%20sarkic.jpg') center center / cover no-repeat fixed;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            line-height: 1.4;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 0;
            border: 4px solid #ffffff;
            box-shadow: 0 0 0 6px #1c1c1c;
            margin-bottom: 30px;
            image-rendering: pixelated;
            z-index: 2;
            display: none;
        }

        .band-name {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 5.1rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: #ffffff;
            line-height: 0.78;
            text-transform: uppercase;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.95);
            z-index: 2;
        }

        .album-section {
            width: 100%;
            max-width: 720px;
            margin-bottom: 50px;
            text-align: center;
            z-index: 2;
        }

        .youtube-embed {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border: 4px solid #ffffff;
            box-shadow: 0 0 0 8px #1c1c1c;
            border-radius: 0;
        }

        .youtube-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .links-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 50px;
            z-index: 2;
        }

        .link-card {
            font-family: 'UnifrakturMaguntia', cursive;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 18px 24px;
            border: 3px solid var(--border-color);
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            text-transform: capitalize;
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 14px;
            text-align: center;
        }

        .link-card svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            fill: #f0f0f0;
            justify-self: start;
        }

        .link-card:hover {
            background-color: var(--card-hover);
            border-color: #ffffff;
            color: #ffffff;
            transform: translateY(-3px);
        }

        .link-card:hover svg {
            fill: #ffffff;
        }

        /* Upcoming Shows Section */
        .shows-section {
            width: 100%;
            max-width: 720px;
            margin-bottom: 50px;
            z-index: 2;
        }

        .shows-header {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 3.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.95);
            text-align: center;
            margin-bottom: 30px;
            line-height: 1;
        }

        .shows-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .show-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: var(--card-bg);
            border: 3px solid var(--border-color);
            padding: 18px 24px;
            transition: all 0.2s ease;
        }

        .show-item:hover {
            border-color: #ffffff;
            background-color: var(--card-hover);
        }

        .show-image-placeholder {
            width: 90px;
            height: 90px;
            flex-shrink: 0;
            background-color: #111;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 0.7rem;
            font-family: 'VT323', monospace;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.3;
        }

        .show-image {
            width: 90px;
            height: 90px;
            flex-shrink: 0;
            object-fit: cover;
            border: 2px solid #444;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .show-image:hover {
            border-color: #ffffff;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border: 3px solid #ffffff;
            box-shadow: 0 0 0 8px #1c1c1c;
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 28px;
            font-family: 'VT323', monospace;
            font-size: 2.5rem;
            color: #ffffff;
            cursor: pointer;
            line-height: 1;
            z-index: 1001;
        }

        .lightbox-close:hover {
            color: #aaaaaa;
        }

        .show-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .show-date {
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            color: #aaaaaa;
            letter-spacing: 2px;
        }

        .show-venue {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 1.6rem;
            color: #ffffff;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .show-location {
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            color: #888888;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: auto;
            font-family: 'VT323', monospace;
            font-size: 0.95rem;
            color: #777777;
            text-align: center;
            letter-spacing: 1px;
            z-index: 2;
        }
    </style>
</head>
<body>

    </div>

    <!-- Upcoming Shows Section -->
    <section class="shows-section">
        <h2 class="shows-header">Upcoming Shows</h2>
        <div class="shows-list">

            <div class="show-item">
                <img src="https://raw.githubusercontent.com/Sark1c/sarkic.github.io/main/Screenshot_20260512-122022.png" alt="May 24 Show" class="show-image">

                <img src="https://raw.githubusercontent.com/Sark1c/sarkic.github.io/main/tba.jpeg" alt="July 4 show" class="show-image">
                <div class="show-info">
                    <span class="show-date">July 4, 2026</span>
                    <span class="show-venue">FDR Skatepark</span>
                    <span class="show-location">Philadelphia, PA</span>
                </div>
            </div>

        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">✕</span>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        document.querySelectorAll('.show-image').forEach(img => {
            img.addEventListener('click', () => {
                document.getElementById('lightbox-img').src = img.src;
                document.getElementById('lightbox-img').alt = img.alt;
                document.getElementById('lightbox').classList.add('active');
            });
        });

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>

</body>
</html>
